<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-labelledby="title desc">
<title id="title">AIエージェント自動引き継ぎハブ</title>
<desc id="desc">GitHub監視、AI実行役への分配、初期設定自動化、進捗連携、本番実行までの全体アーキテクチャ図</desc>
<defs>
  <linearGradient id="blue" x1="0" x2="1"><stop offset="0" stop-color="#0f6fff"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
  <linearGradient id="teal" x1="0" x2="1"><stop offset="0" stop-color="#05a6b5"/><stop offset="1" stop-color="#12b981"/></linearGradient>
  <linearGradient id="purple" x1="0" x2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#2563eb"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1d4ed8" flood-opacity="0.12"/></filter>
  <style>
    .bg{fill:#f8fbff}.card{fill:white;stroke:#bfdbfe;stroke-width:2;filter:url(#shadow)}.small{font:500 22px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#334155}.body{font:600 25px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0f172a}.title{font:900 66px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#081432}.accent{fill:url(#blue)}.badge{fill:url(#blue)}.badge2{fill:url(#purple)}.badge3{fill:url(#teal)}.white{fill:#fff}.muted{fill:#64748b}.line{stroke:#0ea5e9;stroke-width:10;stroke-linecap:round;marker-end:url(#arrow)}.tick{fill:#10b981}.mono{font:700 22px ui-monospace,Menlo,monospace;fill:#0f172a}.label{font:800 26px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0f172a}.tiny{font:500 18px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#475569}
  </style>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#0ea5e9"/></marker>
</defs>
<rect class="bg" width="1672" height="941"/>
<text x="70" y="86" class="title">止まった開発を、</text><text x="610" y="86" class="title accent">AIエージェント</text><text x="1090" y="86" class="title">が自動で引き継ぐ。</text>
<text x="228" y="134" class="body">GitHub監視 / 初期設定 / ブラウザ操作 / ローカル操作 / Notion・Google To Do連携 / 本番実行までを自動化</text>

<rect x="28" y="158" width="250" height="560" rx="24" class="card"/><rect x="42" y="174" width="222" height="44" rx="22" class="badge"/><text x="78" y="205" class="label white">1. 検出</text><text x="64" y="252" class="label" fill="#075985">GitHubリポジトリを監視</text>
<rect x="44" y="264" width="218" height="190" rx="14" fill="#f8fafc" stroke="#dbeafe"/><text x="72" y="294" class="mono">Repositories</text><text x="224" y="294" class="tiny">12</text>
<text x="66" y="331" class="tiny">awesome-project  ★128</text><text x="66" y="367" class="tiny">demo-app        ★42</text><text x="66" y="403" class="tiny">internal-tool   ★17</text><text x="66" y="438" class="tiny">...</text>
<rect x="44" y="474" width="218" height="52" rx="12" fill="#fff7ed" stroke="#fed7aa"/><text x="78" y="508" class="body">未完了 Issue</text><text x="224" y="508" class="tiny">8</text>
<rect x="44" y="536" width="218" height="52" rx="12" fill="#faf5ff" stroke="#ddd6fe"/><text x="78" y="570" class="body">放置 PR</text><text x="224" y="570" class="tiny">5</text>
<rect x="44" y="598" width="218" height="52" rx="12" fill="#fefce8" stroke="#fde68a"/><text x="78" y="632" class="body">初期設定待ち</text><text x="224" y="632" class="tiny">3</text>
<rect x="44" y="660" width="218" height="44" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/><text x="78" y="689" class="body">README 未整備</text>
<path d="M286 438 H328" class="line"/>

<rect x="330" y="158" width="438" height="560" rx="24" class="card"/><rect x="390" y="174" width="318" height="44" rx="22" class="badge2"/><text x="434" y="205" class="label white">2. 判断・分配</text><text x="428" y="252" class="body" fill="#6d28d9">AIが状況を理解し、最適に分配</text>
<circle cx="550" cy="420" r="138" fill="url(#purple)" opacity="0.20"/><circle cx="550" cy="420" r="118" fill="url(#purple)"/><text x="424" y="384" class="label white">AI自動引き継ぎハブ</text><text x="476" y="424" class="body white">タスク理解</text><text x="476" y="464" class="body white">優先度付け</text><text x="476" y="504" class="body white">担当AIへ割当</text><text x="476" y="544" class="body white">共有メモリ</text>
<rect x="366" y="594" width="124" height="96" rx="14" fill="#ecfdf5" stroke="#99f6e4"/><text x="390" y="635" class="label" fill="#047857">Codex</text><text x="383" y="670" class="tiny">実装 / 修正 / テスト</text>
<rect x="506" y="594" width="138" height="96" rx="14" fill="#fff7ed" stroke="#fed7aa"/><text x="526" y="635" class="label" fill="#ea580c">Claude Code</text><text x="524" y="670" class="tiny">設計 / 文書化</text>
<rect x="660" y="594" width="94" height="96" rx="14" fill="#eff6ff" stroke="#bfdbfe"/><text x="674" y="635" class="label" fill="#2563eb">Gemini</text><text x="674" y="670" class="tiny">調査 / QA</text>
<path d="M776 438 H816" class="line"/>

<rect x="820" y="158" width="262" height="560" rx="24" class="card"/><rect x="850" y="174" width="202" height="44" rx="22" class="badge3"/><text x="884" y="205" class="label white">3. 自動実行</text><text x="846" y="252" class="body" fill="#047857">必要な作業をAIが自動で実行</text>
<g class="body"><rect x="846" y="276" width="210" height="62" rx="12" fill="#fff" stroke="#dbeafe"/><text x="894" y="316">API設定</text><rect x="846" y="352" width="210" height="62" rx="12" fill="#fff" stroke="#dbeafe"/><text x="894" y="392">ブラウザ操作</text><rect x="846" y="428" width="210" height="62" rx="12" fill="#fff" stroke="#dbeafe"/><text x="874" y="468">ローカルファイル操作</text><rect x="846" y="504" width="210" height="62" rx="12" fill="#fff" stroke="#dbeafe"/><text x="870" y="544">Secrets / 環境変数</text><rect x="846" y="580" width="210" height="62" rx="12" fill="#fff" stroke="#dbeafe"/><text x="894" y="620">CI/CD 実行</text><rect x="846" y="656" width="210" height="46" rx="12" fill="#fff" stroke="#dbeafe"/><text x="894" y="687">デプロイ準備</text></g>
<path d="M1090 438 H1130" class="line"/>

<rect x="1140" y="158" width="270" height="560" rx="24" class="card"/><rect x="1164" y="174" width="222" height="44" rx="22" class="badge"/><text x="1194" y="205" class="label white">4. 進捗連携・可視化</text><text x="1188" y="252" class="body" fill="#2563eb">進捗を自動で共有・可視化</text>
<rect x="1166" y="276" width="220" height="90" rx="14" fill="#fff" stroke="#dbeafe"/><text x="1228" y="314" class="label">Notion連携</text><text x="1228" y="346" class="tiny">タスク生成・進捗更新・ログ保存</text>
<rect x="1166" y="382" width="220" height="90" rx="14" fill="#fff" stroke="#dbeafe"/><text x="1210" y="420" class="label" fill="#2563eb">Google To Do連携</text><text x="1210" y="452" class="tiny">未完了タスクを自動反映</text>
<rect x="1166" y="488" width="220" height="90" rx="14" fill="#fff" stroke="#dbeafe"/><text x="1210" y="526" class="label">進捗ダッシュボード</text><text x="1210" y="558" class="tiny">ボトルネックを検出</text>
<rect x="1166" y="594" width="220" height="94" rx="14" fill="#fff" stroke="#dbeafe"/><text x="1210" y="632" class="label">AI同士の引き継ぎ</text><text x="1210" y="664" class="tiny">次のAIがすぐ再開可能</text>
<path d="M1418 438 H1458" class="line"/>

<rect x="1466" y="158" width="178" height="560" rx="24" class="card"/><rect x="1490" y="174" width="130" height="44" rx="22" class="badge3"/><text x="1520" y="205" class="label white">5. 完了</text><text x="1500" y="252" class="body" fill="#047857">自動で完了まで導く</text>
<circle cx="1555" cy="390" r="92" fill="#ecfeff" stroke="#bae6fd"/><path d="M1558 310 C1616 354 1594 428 1530 464 C1528 396 1505 354 1558 310Z" fill="#14b8a6"/><circle cx="1560" cy="360" r="14" fill="#fff"/><circle cx="1595" cy="470" r="38" class="tick"/><text x="1582" y="484" font-size="54" fill="#fff">✓</text>
<text x="1500" y="546" class="body">✓ ビルド完了</text><text x="1500" y="590" class="body">✓ テスト完了</text><text x="1500" y="634" class="body">✓ 本番準備完了</text><text x="1494" y="690" class="body">人間がやるのは</text><text x="1494" y="724" class="body">最後の最小作業だけ</text>

<rect x="28" y="748" width="1616" height="160" rx="22" fill="#fff" stroke="#dbeafe" filter="url(#shadow)"/>
<text x="160" y="802" class="label" fill="#2563eb">中途半端なリポジトリを自動検出</text><text x="160" y="842" class="tiny">放置IssueやPR、初期設定不足を継続監視して取りこぼしなく可視化。</text>
<text x="560" y="802" class="label" fill="#7c3aed">初期設定をAIが代行</text><text x="560" y="842" class="tiny">API設定、Secrets登録、ローカル環境構築、CI/CD設定まで自動化。</text>
<text x="980" y="802" class="label" fill="#0f766e">進捗を自動で同期</text><text x="980" y="842" class="tiny">NotionやGoogle To Doへタスク・進捗・ログを常に最新状態で共有。</text>
<text x="1320" y="802" class="label" fill="#2563eb">AI同士で引き継ぎ可能</text><text x="1320" y="842" class="tiny">メモとコンテキストを保存し、中断ゼロで再開。</text>
</svg>
