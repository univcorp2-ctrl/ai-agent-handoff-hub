name: AI Agent Handoff Hub

on:
  workflow_dispatch:
    inputs:
      target_repos:
        description: "Comma separated repositories: owner/repo,owner/repo2"
        required: false
        default: ""
      stale_days:
        description: "Days since update to treat issue/PR as stale"
        required: false
        default: "14"
      dry_run:
        description: "Skip external sync and issue creation"
        required: false
        default: "true"
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  issues: write
  actions: read

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .
      - name: Pytest
        run: pytest -q

  handoff-run:
    name: Scan repos and generate handoff report
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e '.[dev]'
      - name: Run AI handoff scanner
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          TARGET_REPOS: ${{ inputs.target_repos || github.repository }}
          STALE_DAYS: ${{ inputs.stale_days || '14' }}
          DRY_RUN: ${{ inputs.dry_run || 'true' }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GOOGLE_TASKS_API_TOKEN: ${{ secrets.GOOGLE_TASKS_API_TOKEN }}
          GOOGLE_TASKS_TASKLIST_ID: ${{ secrets.GOOGLE_TASKS_TASKLIST_ID }}
          GOOGLE_TASKS_WEBHOOK_URL: ${{ secrets.GOOGLE_TASKS_WEBHOOK_URL }}
          AUTO_CREATE_GITHUB_ISSUES: ${{ vars.AUTO_CREATE_GITHUB_ISSUES || 'false' }}
        run: |
          python -m ai_agent_handoff_hub run-all \
            --target-repos "${TARGET_REPOS}" \
            --stale-days "${STALE_DAYS}" \
            --output-dir outputs
      - name: Upload handoff report
        uses: actions/upload-artifact@v4
        with:
          name: ai-agent-handoff-report
          path: outputs
